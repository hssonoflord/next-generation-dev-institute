<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WeGrow Community — 제자화를 통해 신앙과 인성과 학업을 함께 향상시키는 방과후교육공동체"
    />
    <title>다음세대개발원 — WeGrow Community</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="home">
    <header class="header" id="header">
      <div class="container header__inner">
        <a href="index.html" class="logo" data-logo></a>
        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-label="메뉴 열기"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav" id="nav" aria-label="주요 메뉴"></nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero__inner">
          <div class="hero__content">
            <span class="hero__badge" id="hero-badge"></span>
            <h1 class="hero__title" id="hero-title"></h1>
            <p class="hero__subtitle" id="hero-subtitle"></p>
            <div class="hero__actions" id="hero-actions"></div>
          </div>
          <div class="hero__visual">
            <div class="hero__pillars" id="hero-pillars" aria-hidden="true"></div>
            <div class="hero__visual-tags" id="hero-visual-tags" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="section scripture" id="mission">
        <div class="container">
          <p class="section-label" id="scripture-label"></p>
          <div class="scripture-block">
            <blockquote class="scripture-block__verses" id="scripture-verses"></blockquote>
            <cite class="scripture-block__ref" id="scripture-ref"></cite>
            <p class="scripture-block__summary" id="scripture-summary"></p>
          </div>
        </div>
      </section>

      <section class="section" id="about">
        <div class="container">
          <p class="section-label" id="about-label"></p>
          <h2 class="section-title" id="about-heading"></h2>
          <div class="about-grid">
            <div class="about-text" id="about-text"></div>
            <div class="values-grid" id="values-grid"></div>
          </div>
        </div>
      </section>

      <section class="section connection">
        <div class="container">
          <p class="section-label" id="connection-label"></p>
          <h2 class="section-title" id="connection-heading"></h2>
          <div class="connection-layout">
            <div class="connection-scripture" id="connection-scripture"></div>
            <ul class="connection-points" id="connection-points"></ul>
          </div>
        </div>
      </section>

      <section class="section indicators">
        <div class="container">
          <p class="section-label" id="indicators-label"></p>
          <h2 class="section-title" id="indicators-heading"></h2>
          <p class="section-desc indicators__desc" id="indicators-desc"></p>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </section>

      <section class="section necessity" id="necessity">
        <div class="container">
          <p class="section-label" id="necessity-label"></p>
          <h2 class="section-title" id="necessity-heading"></h2>
          <p class="section-desc necessity__intro" id="necessity-intro"></p>
          <div class="necessity-grid" id="necessity-grid"></div>
          <div class="church-resources" id="church-resources"></div>
        </div>
      </section>

      <section class="section collaboration" id="collaboration">
        <div class="container">
          <p class="section-label" id="collaboration-label"></p>
          <h2 class="section-title" id="collaboration-heading"></h2>
          <p class="section-desc" id="collaboration-desc"></p>
          <div class="collaboration-grid" id="collaboration-grid"></div>
        </div>
      </section>

      <section class="section" id="contact">
        <div class="container">
          <p class="section-label" id="contact-label"></p>
          <h2 class="section-title" id="contact-heading"></h2>
          <p class="section-desc" id="contact-desc"></p>
          <div class="contact-card">
            <div class="contact-info" id="contact-info"></div>
            <div class="contact-cta">
              <p class="contact-cta__text">
                지역 WGC 설립, 프로그램 도입, 협력 교회 문의를 환영합니다.<br />
                연락 주시면 빠른 시일 내에 답변 드리겠습니다.
              </p>
              <a href="projects.html" class="btn btn--primary">프로그램 자세히 보기</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="content/site-content.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
